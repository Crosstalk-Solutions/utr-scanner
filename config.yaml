# UTR Scanner Configuration
# -------------------------

# The SSID to monitor
target_ssid: "MyNetwork"

# Expected security type: WPA2, WPA3, WPA2/WPA3
# Any result other than this triggers an alert
expected_security: "WPA2"

# How often to scan (in seconds)
scan_interval: 60

# WiFi interface to use for scanning
# On Raspberry Pi, this is usually wlan0 (built-in) or wlan1 (USB adapter)
wifi_interface: "wlan0"

# Web dashboard settings
web:
  host: "0.0.0.0"
  port: 8585

# Alerts - uncomment and configure the ones you want
alerts:
  # Sound an audible beep on the Pi
  beep: true

  # Send a webhook (e.g., Discord, Slack, Home Assistant)
  # webhook_url: "https://hooks.slack.com/services/YOUR/WEBHOOK/URL"

  # Send a Pushover notification
  # pushover:
  #   user_key: "your-user-key"
  #   api_token: "your-api-token"
